[package]
name = "build-ui"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true


[dependencies]
bdk = { workspace = true, features = ["fe"] }

wasm-bindgen = { version = "0.2.100" }
wasm-bindgen-futures = { version = "0.4.49" }
web-sys = { version = "0.3.74" }
serde = { workspace = true, features = ["derive"] }

#FIXME: `rest-api` crate has `getrandom` dependency, but it's listed here
getrandom = { version = "0.2", features = ["js"] }

common = { workspace = true, features = ["web"] }
async-trait = "0.1.88"
google-wallet = { workspace = true }
dioxus-oauth = { workspace = true }

[features]
default = []
web = ["bdk/web"]
server = ["bdk/server"]
lambda = ["server", "bdk/lambda"]
